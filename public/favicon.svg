<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5cc" />
      <stop offset="100%" stop-color="#2299ff" />
    </linearGradient>
    <linearGradient id="brain-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ff4466" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#0a0a0f" />
  
  <!-- Connecting bridge -->
  <line x1="35" y1="50" x2="65" y2="50" stroke="#4da6ff" stroke-width="4" stroke-dasharray="2 2" opacity="0.6"/>

  <!-- AI network node (left) -->
  <circle cx="35" cy="50" r="18" fill="none" stroke="url(#ai-grad)" stroke-width="6" />
  <circle cx="35" cy="50" r="6" fill="url(#ai-grad)" />
  
  <!-- Connections -->
  <path d="M 35 32 L 20 15 M 35 68 L 20 85" stroke="url(#ai-grad)" stroke-width="4" stroke-linecap="round" />

  <!-- Brain hemisphere (right) -->
  <path d="M 65 30 C 85 30, 90 40, 90 50 C 90 65, 75 70, 65 70 C 50 70, 50 30, 65 30 Z" fill="url(#brain-grad)" />
</svg>
